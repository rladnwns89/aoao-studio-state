<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KWJ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400&family=Geist:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100vh;
      background: #eef1f7;
      overflow: hidden;
      font-family: 'Geist', 'Inter', sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
    }

    .wrap {
      position: fixed;
      left: 48px;
      bottom: 52px;
      z-index: 10;
      opacity: 0;
      transform: translateY(6px);
      animation: up .7s cubic-bezier(.22,1,.36,1) .6s forwards;
    }

    .label {
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #94a3b8;
      font-weight: 300;
      margin-bottom: 8px;
    }

    .name {
      font-size: clamp(32px, 4vw, 52px);
      font-weight: 500;
      color: #0f172a;
      letter-spacing: -.02em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .name .accent { color: #2563eb; }
    .name .dim    { color: #94a3b8; }

    .sub {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      color: #94a3b8;
      letter-spacing: .04em;
      margin-bottom: 24px;
    }

    .progress {
      width: 160px;
      height: 2px;
      background: #dde3ee;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #2563eb;
      border-radius: 99px;
      animation: grow 6s cubic-bezier(.4,0,.2,1) .4s forwards;
    }

    @keyframes up   { to { opacity: 1; transform: none; } }
    @keyframes grow { to { width: 100%; } }
    body.out { animation: fadeOut .5s ease forwards; }
    @keyframes fadeOut { to { opacity: 0; } }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="wrap">
  <p class="label">made by</p>
  <h1 class="name"><span class="accent">KWJ</span> <span class="dim">/ 김우준</span></h1>
  <p class="sub">aoao-studio.onrender.com</p>
  <div class="progress"><div class="progress-fill"></div></div>
</div>

<script>
const REDIRECT_TO = "/main"; // ✏️ 경로 수정

const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
let W, H;

function resize() {
  W = cvs.width  = window.innerWidth;
  H = cvs.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 색상 팔레트 — bg 기반 블루-그레이
const BLUE   = '37,99,235';   // #2563eb
const SLATE  = '148,163,184'; // #94a3b8
const DARK   = '15,23,42';    // #0f172a
const GRID   = 80;

/* triangles */
function makeTri() {
  const s = 30 + Math.random() * 110;
  return {
    x: Math.random() * (W || 1200),
    y: Math.random() * (H || 800),
    s,
    rot: Math.random() * Math.PI * 2,
    vr: (Math.random() - .5) * .004,
    vx: (Math.random() - .5) * .22,
    vy: (Math.random() - .5) * .22,
    alpha: .06 + Math.random() * .1,
    filled: Math.random() > .55,
    col: Math.random() > .5 ? BLUE : SLATE,
  };
}

const tris = Array.from({ length: 20 }, makeTri);

/* orbiting rings */
const rings = Array.from({ length: 5 }, (_, i) => ({
  cx: (W || 1200) * (.15 + i * .18),
  cy: (H || 800)  * (.25 + (i % 2) * .4),
  r: 36 + i * 26,
  speed: .003 + i * .0014,
  angle: (i / 5) * Math.PI * 2,
  alpha: .09 + i * .01,
  col: i % 2 === 0 ? BLUE : SLATE,
}));

/* diagonal drift lines */
const dlines = Array.from({ length: 10 }, (_, i) => ({
  y: ((H || 800) / 10) * i,
  vy: .12 + Math.random() * .18,
  alpha: .04 + Math.random() * .04,
  col: Math.random() > .5 ? BLUE : SLATE,
}));

function draw() {
  ctx.clearRect(0, 0, W, H);

  /* subtle grid */
  ctx.lineWidth = .5;
  ctx.strokeStyle = `rgba(${SLATE},0.15)`;
  for (let x = 0; x < W; x += GRID) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += GRID) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  /* diagonal lines */
  dlines.forEach(dl => {
    dl.y += dl.vy;
    if (dl.y > H + 80) dl.y = -80;
    ctx.save();
    ctx.strokeStyle = `rgba(${dl.col},${dl.alpha})`;
    ctx.lineWidth = .6;
    ctx.beginPath();
    ctx.moveTo(0, dl.y);
    ctx.lineTo(W, dl.y - 140);
    ctx.stroke();
    ctx.restore();
  });

  /* rings */
  rings.forEach(rg => {
    rg.angle += rg.speed;
    const px = rg.cx + Math.cos(rg.angle) * rg.r;
    const py = rg.cy + Math.sin(rg.angle) * rg.r;

    ctx.beginPath();
    ctx.arc(rg.cx, rg.cy, rg.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${rg.col},${rg.alpha * .5})`;
    ctx.lineWidth = .6;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(px, py, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${rg.col},${rg.alpha * 2.5})`;
    ctx.fill();
  });

  /* triangles */
  tris.forEach(tr => {
    tr.rot += tr.vr;
    tr.x   += tr.vx;
    tr.y   += tr.vy;
    if (tr.x < -200) tr.x = W + 200;
    if (tr.x > W+200) tr.x = -200;
    if (tr.y < -200) tr.y = H + 200;
    if (tr.y > H+200) tr.y = -200;

    const h = tr.s * Math.sqrt(3) / 2;
    ctx.save();
    ctx.translate(tr.x, tr.y);
    ctx.rotate(tr.rot);
    ctx.beginPath();
    ctx.moveTo(0, -h * .67);
    ctx.lineTo( tr.s / 2,  h * .33);
    ctx.lineTo(-tr.s / 2,  h * .33);
    ctx.closePath();

    if (tr.filled) {
      ctx.fillStyle = `rgba(${tr.col},${tr.alpha * .3})`;
      ctx.fill();
    }
    ctx.strokeStyle = `rgba(${tr.col},${tr.alpha})`;
    ctx.lineWidth = .8;
    ctx.stroke();
    ctx.restore();
  });

  requestAnimationFrame(draw);
}

draw();

setTimeout(() => {
  document.body.classList.add('out');
  setTimeout(() => { window.location.href = REDIRECT_TO; }, 500);
}, 6000);
</script>
</body>
</html>
